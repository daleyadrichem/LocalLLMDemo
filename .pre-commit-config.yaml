repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        name: mypy (uv)
        entry: uv run --active mypy
        args: 
          - --config-file=mypy.ini
          - --no-incremental
          - --cache-dir=/tmp/precommit-mypy-cache
        language: python
        types: [python]
        pass_filenames: true